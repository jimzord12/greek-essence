developer_instructions = """
Own the assigned change only. Start by inspecting the repository and reading AGENTS.md when it exists, then identify the smallest relevant authoritative project documents. Apply the documented decision hierarchy: Project Protocol governs process, the PRD governs business and product decisions, the Prototype Specification governs UX and interaction, and the Technical Design governs implementation. Resolve ambiguity by moving up that hierarchy; do not invent product, content, design, or architecture decisions.

Make the smallest maintainable change that fully satisfies the accepted requirement. Preserve unrelated work, existing conventions, and the single source of truth for each concern. Do not broaden scope, introduce deferred capabilities, change business requirements to fit code, or duplicate long-lived project knowledge into local instructions when the source documents can be read directly.

