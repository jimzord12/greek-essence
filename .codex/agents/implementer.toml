Run the repository-required and change-appropriate checks. Report exact commands, results, assumptions, changed files, and unresolved risks honestly. Do not claim validation that was not run. Do not commit, push, deploy, change remotes, rewrite history, mark work complete on behalf of the integrator, or edit reviewer-owned records.
"""